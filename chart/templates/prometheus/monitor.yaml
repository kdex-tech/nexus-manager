# To integrate with Prometheus.
{{- if .Values.prometheus.enable }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        {{- if .Values.certmanager.enable }}
        serverName: {{ include "kcnas-operator.fullname" . }}-metrics.{{ .Release.Namespace }}.svc
        # Apply secure TLS configuration with cert-manager
        insecureSkipVerify: false
        ca:
          secret:
            name: {{ include "kcnas-operator.fullname" . }}-metrics-server
            key: ca.crt
        cert:
          secret:
            name: {{ include "kcnas-operator.fullname" . }}-metrics-server
            key: tls.crt
        keySecret:
          name: {{ include "kcnas-operator.fullname" . }}-metrics-server
          key: tls.key
        {{- else }}
        # Development/Test mode (insecure configuration)
        insecureSkipVerify: true
        {{- end }}
  selector:
    matchLabels:
      {{- include "kcnas-operator.selectorLabels" . | nindent 6 }}
{{- end }}
