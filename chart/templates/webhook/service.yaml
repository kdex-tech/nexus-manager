{{- if .Values.webhook.enable }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    {{- include "kcnas-operator.selectorLabels" . | nindent 4 }}
{{- end }}
