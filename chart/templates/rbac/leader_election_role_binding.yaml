{{- if .Values.rbac.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kcnas-operator.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "kcnas-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
