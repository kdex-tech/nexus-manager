{{- if .Values.rbac.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-host-manager
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kdex.dev
  resources:
  - kdexapps
  - kdexclusterapps
  - kdexclusterfaasadaptors
  - kdexclusterpagearchetypes
  - kdexclusterpagefooters
  - kdexclusterpageheaders
  - kdexclusterpagenavigations
  - kdexclusterscriptlibraries
  - kdexclusterthemes
  - kdexfaasadaptors
  - kdexpagearchetypes
  - kdexpagefooters
  - kdexpageheaders
  - kdexpagenavigations
  - kdexrolebindings
  - kdexroles
  - kdexscriptlibraries
  - kdexthemes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kdex.dev
  resources:
  - kdexfunctions
  - kdexinternalhosts
  - kdexinternalpackagereferences
  - kdexinternaltranslations
  - kdexinternalutilitypages
  - kdexpages
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kdex.dev
  resources:
  - kdexfunctions/finalizers
  - kdexinternalhosts/finalizers
  - kdexinternalpackagereferences/finalizers
  - kdexinternaltranslations/finalizers
  - kdexinternalutilitypages/finalizers
  - kdexpages/finalizers
  verbs:
  - update
- apiGroups:
  - kdex.dev
  resources:
  - kdexfunctions/status
  - kdexinternalhosts/status
  - kdexinternalpackagereferences/status
  - kdexinternaltranslations/status
  - kdexinternalutilitypages/status
  - kdexpages/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kpack.io
  resources:
  - images
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kpack.io
  resources:
  - images/finalizers
  verbs:
  - update
- apiGroups:
  - kpack.io
  resources:
  - images/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# host-manager's chart-rendered ClusterRole (kdex-tech/host-manager v0.2.58+)
# adds serving.knative.dev/services so the deployer Job (running as the
# host-manager SA) can apply the Knative Service it generates. Mirror the
# grant here so the privilege-escalation guard accepts the upgrade —
# without this, helm-upgrade fails with "user
# system:serviceaccount:kcnas-system:kcnas-operator is attempting to
# grant RBAC permissions not currently held."
- apiGroups:
  - serving.knative.dev
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end -}}
