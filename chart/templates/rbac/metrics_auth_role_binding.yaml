{{- if and .Values.rbac.enable .Values.metrics.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-metrics-auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kcnas-operator.fullname" . }}-metrics-auth
subjects:
- kind: ServiceAccount
  name: {{ include "kcnas-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
