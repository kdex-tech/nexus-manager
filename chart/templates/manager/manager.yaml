apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    checksum/config: {{ .Values.config | toJson | sha256sum }}
    checksum/controllerConfig: {{ .Values.controllerConfig | toJson | sha256sum }}
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas:  {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      {{- include "kcnas-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.config | toJson | sha256sum }}
        checksum/controllerConfig: {{ .Values.controllerConfig | toJson | sha256sum }}
      labels:
        {{- include "kcnas-operator.labels" . | nindent 8 }}
        {{- if and .Values.controllerManager.pod .Values.controllerManager.pod.labels }}
        {{- range $key, $value := .Values.controllerManager.pod.labels }}
        {{ $key }}: {{ $value }}
        {{- end }}
        {{- end }}
    spec:
      containers:
        - name: manager
          args:
            {{- range .Values.controllerManager.container.args }}
            - {{ . }}
            {{- end }}
            {{- if .Values.controllerManager.container.extraArgs }}
            {{- range $k, $v := .Values.controllerManager.container.extraArgs }}
            {{- toYaml $v | nindent 12 }}
            {{- end }}
            {{- end }}
            {{- if and .Values.certmanager.enable .Values.webhook.enable }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
            {{- if and .Values.certmanager.enable .Values.metrics.enable }}
            - --metrics-cert-path=/tmp/k8s-metrics-server/metrics-certs
            {{- end }}
          command:
            - /manager
          {{- if .Values.controllerManager.container.env }}
          env:
            - name: HOST_MANAGER_CLUSTER_ROLE
              value: {{ include "kcnas-operator.fullname" . }}-host-manager
            {{- range $key, $value := .Values.controllerManager.container.env }}
            - name: {{ $key }}
              value: {{ $value }}
            {{- end }}
            {{- if .Values.controllerManager.container.extraEnv }}
            {{- range $k, $v := .Values.controllerManager.container.extraEnv }}
            {{- toYaml $v | nindent 12 }}
            {{- end }}
            {{- end }}
          {{- end }}
          image: {{ .Values.controllerManager.container.image.repository }}:{{ .Values.controllerManager.container.image.tag | default .Chart.AppVersion }}
          {{- if .Values.controllerManager.container.imagePullPolicy }}
          imagePullPolicy: {{ .Values.controllerManager.container.imagePullPolicy }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.controllerManager.container.livenessProbe | nindent 12 }}
          {{- if .Values.webhook.enable }}
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          {{- end }}
          readinessProbe:
            {{- toYaml .Values.controllerManager.container.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.controllerManager.container.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controllerManager.container.securityContext | nindent 12 }}
          {{- if and .Values.certmanager.enable (or .Values.webhook.enable .Values.metrics.enable) }}
          volumeMounts:
            - mountPath: /config.yaml
              name: config
              subPath: config.yaml
            - mountPath: /etc/podinfo
              name: podinfo
            {{- if and .Values.webhook.enable .Values.certmanager.enable }}
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- if and .Values.metrics.enable .Values.certmanager.enable }}
            - name: metrics-certs
              mountPath: /tmp/k8s-metrics-server/metrics-certs
              readOnly: true
            {{- end }}
          {{- end }}
      securityContext:
        {{- toYaml .Values.controllerManager.securityContext | nindent 8 }}
      serviceAccountName: {{ include "kcnas-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.controllerManager.terminationGracePeriodSeconds }}
      {{- if and .Values.certmanager.enable (or .Values.webhook.enable .Values.metrics.enable) }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kcnas-operator.fullname" . }}
        - name: podinfo
          downwardAPI:
            items:
              - path: "labels"
                fieldRef:
                  fieldPath: metadata.labels
        {{- if and .Values.webhook.enable .Values.certmanager.enable }}
        - name: webhook-cert
          secret:
            secretName: {{ include "kcnas-operator.fullname" . }}-webhook-server
        {{- end }}
        {{- if and .Values.metrics.enable .Values.certmanager.enable }}
        - name: metrics-certs
          secret:
            secretName: {{ include "kcnas-operator.fullname" . }}-metrics-server
        {{- end }}
      {{- end }}
