{{- if .Values.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "kcnas-operator.labels" . | nindent 4 }}
  name: {{ include "kcnas-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    {{- include "kcnas-operator.selectorLabels" . | nindent 4 }}
{{- end }}
