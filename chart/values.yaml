# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [CONFIG]: Configuration for the controller-manager
config:
  backendDefault:
    # 0.1.6 is the first tag that runs as a non-root user (uid 65532) and
    # listens on port 8080 instead of 80 - required for the embedded
    # default BackendDefault.Deployment template in kdex-crds to actually
    # admit Pods under PodSecurity "restricted" namespaces. Earlier tags
    # (<=0.1.5) bind to port 80 and run as root, incompatible with the
    # restricted profile's CAP_NET_BIND_SERVICE drop and runAsNonRoot
    # requirement.
    serverImage: ghcr.io/kdex-tech/backend-static:0.1.7
    serverImagePullPolicy: IfNotPresent
  defaultImageRegistry: docker.io
  defaultNpmRegistry: registry.npmjs.org
  packages:
    packagerImage: ghcr.io/kdex-tech/cli-tools:0.3.11
    packagerImagePullPolicy: IfNotPresent
    toolsImage: ghcr.io/kdex-tech/node-tools:0.3.0
    toolsImagePullPolicy: IfNotPresent
    # Packaging-pipeline knobs (node-tools >= 0.3.0, kdex-tech/node-tools#3).
    # Empty = image defaults (npm + node), byte-identical to prior behavior.
    installer: ""   # "" (npm) | bun    — dependency install in get_modules
    runtime: ""     # "" (node) | bun | deno — runs optimize/generate/bundle_cjs
    # Per-host PVC (this namespace) mounted at /cache to persist the npm+bun
    # download cache across packaging Jobs — reusable ("warm") installs.
    # Empty = ephemeral cache (cold). Operator provisions the PVC (RWO).
    cacheClaim: ""

# [MANAGER]: Manager Deployment Configurations
controllerManager:
  container:
    args:
    - "--leader-elect"
    - "--metrics-bind-address=:8443"
    - "--health-probe-bind-address=:8081"
    extraArgs: {}
      # x-foo:
      # - "--zap-log-level=info"
    extraEnv: {}
      # x-foo:
      # - name: FOO
      #   value: BAR
    image:
      repository: ghcr.io/kdex-tech/nexus-manager
      tag: ""
    imagePullPolicy: IfNotPresent
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8081
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8081
      initialDelaySeconds: 5
      periodSeconds: 10
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - "ALL"
  replicas: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10

# These labels are applied to all resources in the chart
extraChartLabels: {}

# [SCHEDULING]: Pod placement for the manager Deployment. Top-level keys
# matching the helm convention used by cert-manager / external-secrets /
# traefik etc.; empty values are omitted from the rendered podSpec.
affinity: {}
nodeSelector: {}
tolerations: []

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true
